[package]
name = "galaxy"
version = "0.1.0"
edition = "2021"
authors = ["dliang <humgal@outlook.com>"]
license = "MIT OR Apache-2.0"
keywords = ["bundle", "cargo"]
repository = "https://github.com/SimulatedWorld/SimulatedWorld.git"
description = "infinite 3d scene generated by AI with user prompt and store in filecion blockchain that can use by everyone"

[package.metadata.bundle]
name = "simulatedworld"
identifier = "simulated.world"
icon = ["galaxy-icon.png"]
category = "game"
short_description = "infinite 3d scene generated by AI  with user prompt and store in filecion blockchain that can use by everyone"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy = "0.12.0"
candle = "0.0.0"
eframe = "0.23.0"
egui = "0.23.0"
egui_extras = "0.23.0"
env_logger = "0.10.0"
image = "0.24.7"
